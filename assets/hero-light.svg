<svg width="880" height="320" viewBox="0 0 880 320" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, monospace">
  <defs>
    <clipPath id="t1"><rect x="36" y="88" width="0" height="24"><animate attributeName="width" from="0" to="90" begin="0.4s" dur="0.6s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <clipPath id="t2"><rect x="36" y="152" width="0" height="24"><animate attributeName="width" from="0" to="140" begin="2.4s" dur="0.8s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <clipPath id="t3"><rect x="36" y="216" width="0" height="24"><animate attributeName="width" from="0" to="395" begin="4.6s" dur="1.4s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- glass card -->
  <rect x="8" y="8" width="864" height="304" rx="20" fill="#000000" fill-opacity="0.025" stroke="#000000" stroke-opacity="0.16"/>

  <!-- title bar -->
  <circle cx="34" cy="36" r="6" fill="#000000" fill-opacity="0.18"/>
  <circle cx="56" cy="36" r="6" fill="#000000" fill-opacity="0.32"/>
  <circle cx="78" cy="36" r="6" fill="#000000" fill-opacity="0.48"/>
  <text x="440" y="41" text-anchor="middle" font-size="13" fill="#7a7a7a">leo@monterrey — ~/build</text>
  <line x1="8" y1="56" x2="872" y2="56" stroke="#000000" stroke-opacity="0.12"/>

  <!-- animated scanline accent -->
  <rect x="8" y="55" width="864" height="2" fill="url(#scan)" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="-880 0; 880 0" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- line 1: whoami -->
  <text x="36" y="106" font-size="17" fill="#7a7a7a">$</text>
  <g clip-path="url(#t1)"><text x="54" y="106" font-size="17" fill="#1c1c1c">whoami</text></g>
  <text x="36" y="134" font-size="17" fill="#000000" font-weight="600" opacity="0">
    Leonardo Sáenz — Full Stack Developer · AI Project Lead
    <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.4s" fill="freeze"/>
  </text>

  <!-- line 2: skills -->
  <text x="36" y="170" font-size="17" fill="#7a7a7a">$</text>
  <g clip-path="url(#t2)"><text x="54" y="170" font-size="17" fill="#1c1c1c">ls ~/stack</text></g>
  <text x="36" y="198" font-size="16" fill="#4d4d4d" opacity="0">
    .NET · Next.js · TypeScript · Python · SQL · n8n · LangChain · AWS
    <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.4s" fill="freeze"/>
  </text>

  <!-- line 3: deploy -->
  <text x="36" y="234" font-size="17" fill="#7a7a7a">$</text>
  <g clip-path="url(#t3)"><text x="54" y="234" font-size="17" fill="#1c1c1c">./ship --agents --erp --to production</text></g>
  <text x="36" y="262" font-size="16" fill="#4d4d4d" opacity="0">
    ▸ deploying intelligent systems
    <animate attributeName="opacity" from="0" to="1" begin="6.2s" dur="0.3s" fill="freeze"/>
  </text>
  <text x="370" y="262" font-size="16" fill="#000000" opacity="0">✓ done
    <animate attributeName="opacity" from="0" to="1" begin="7.2s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- blinking cursor -->
  <rect x="36" y="278" width="10" height="19" fill="#000000" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" begin="7.6s" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
